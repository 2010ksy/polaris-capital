# 북극성 자산운용 — Netlify 설정
[build]
  publish = "."
  functions = "netlify/functions"

# 시세 프록시 함수에 깔끔한 경로 부여: /api/market → 함수
[[redirects]]
  from = "/api/market"
  to = "/.netlify/functions/market"
  status = 200

# 카카오 로그인 OAuth 교환: /api/kakao → 함수
[[redirects]]
  from = "/api/kakao"
  to = "/.netlify/functions/kakao-auth"
  status = 200

# AI 시황 분석: /api/ai → 함수
[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai-analyze"
  status = 200
