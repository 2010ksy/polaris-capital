<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>내 대시보드 · 북극성 자산운용</title>
<style>
  :root{--bg:#0a0f1c;--bg2:#0e1626;--card:#121c30;--card2:#16223a;--border:#22304a;
    --text:#eaf0fa;--muted:#90a0bb;--gold:#d9b46a;--gold2:#f0d59a;--accent:#4b8bff;--up:#22c55e;--down:#f6465d;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1040px;margin:0 auto;padding:0 18px 60px}
  nav{position:sticky;top:0;z-index:30;background:rgba(10,15,28,.85);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
  nav .wrap{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 18px}
  .brand{font-weight:800;letter-spacing:.4px}.brand .s{color:var(--gold)}
  .navbtns{display:flex;gap:10px;align-items:center;font-size:14px}
  .navbtns a,.navbtns span{padding:7px 13px;border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--muted)}
  h1{font-size:24px;margin:26px 0 4px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:20px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:14px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
  .card .k{font-size:12px;color:var(--muted)}.card .v{font-size:24px;font-weight:800;margin-top:6px}.card .s2{font-size:13px;margin-top:4px}
  .up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--muted)}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:18px}
  .panel h2{font-size:17px;margin-bottom:14px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{padding:10px 8px;text-align:right;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-size:12px;font-weight:600}th:first-child,td:first-child{text-align:left}
  .mk{font-size:11px;color:var(--muted);border:1px solid var(--border);border-radius:5px;padding:1px 5px;margin-right:6px}
  .cmp{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;text-align:center}
  .cmp .b{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px}
  .cmp .b .k{font-size:12px;color:var(--muted)}.cmp .b .v{font-size:20px;font-weight:800;margin-top:6px}
  .guide{list-style:none;display:flex;flex-direction:column;gap:10px}
  .guide li{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px}
  .guide .ic{font-size:16px}
  .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .btn{padding:11px 18px;border-radius:10px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:14px}
  .btn.gold{background:var(--gold);color:#1a1206;border-color:var(--gold)}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn.danger{color:var(--down);border-color:var(--down)}
  .editrow{display:flex;align-items:center;gap:10px;margin:8px 0}
  .editrow label{flex:1;font-size:14px}
  .editrow input{width:90px;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);text-align:right}
  .editrow input.seed{width:160px}
  select,.editrow select{padding:9px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text)}
  input{font-family:inherit}
  .wsum{font-weight:700;margin-top:8px}.muted{color:var(--muted)}
  .disc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:12px;color:var(--muted);margin-top:18px}
  .loading{color:var(--muted);padding:50px;text-align:center}
  /* 탭 */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 4px}
  .tab{padding:8px 14px;border:1px solid var(--border);border-radius:9px;cursor:pointer;font-size:13.5px;color:var(--muted);background:var(--card)}
  .tab.on{color:#1a1206;background:var(--gold);border-color:var(--gold);font-weight:700}
  .tab.add{color:var(--gold2);border-style:dashed}
  /* 상품 카드 그리드 */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:6px}
  .pcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;gap:6px}
  .pcard .ptag{font-size:11px;color:var(--gold);border:1px solid var(--border);border-radius:6px;padding:1px 7px;align-self:flex-start}
  .pcard h3{font-size:17px}.pcard .ptarget{color:var(--gold2);font-weight:700;font-size:14px}
  .pcard .pdesc{font-size:12.5px;color:var(--muted);flex:1}
  .risk i{display:inline-block;width:14px;height:5px;border-radius:3px;background:var(--border);margin-right:3px}
  .risk i.on{background:var(--gold)}
  /* 자산 점검 입력행 */
  .arow{display:grid;grid-template-columns:1fr 110px 150px 110px 34px;gap:8px;align-items:center;margin:7px 0}
  .arow input,.arow select{padding:9px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text)}
  .arow input{text-align:right}.arow input.nm{text-align:left}
  .arow .x{cursor:pointer;color:var(--down);text-align:center;border:1px solid var(--border);border-radius:8px;padding:9px 0}
  .ahead{display:grid;grid-template-columns:1fr 110px 150px 110px 34px;gap:8px;font-size:11px;color:var(--muted);margin-bottom:2px}
  .twogrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:620px){.twogrid{grid-template-columns:1fr}.arow,.ahead{grid-template-columns:1fr 80px 110px 70px 30px}}
  #editPanel{display:none}
  @media print{nav,.tabs,.btns,.navbtns,#editPanel,.noprint{display:none!important}
    body{background:#fff;color:#000}.card,.panel,.cmp .b,.guide li{background:#fff;border-color:#bbb;color:#000}
    .muted,.card .k,th{color:#444}h1{margin-top:0}.reportonly{display:block!important}}
  .reportonly{display:none}
</style></head>
<body>
<nav><div class="wrap">
  <div class="brand"><span class="s">✦</span> 북극성 자산운용</div>
  <div class="navbtns" id="navbtns"><a href="/">홈</a></div>
</div></nav>
<div class="wrap" id="root"><div class="loading">불러오는 중…</div></div>

<script src="assets/config.js"></script>
<script src="assets/core.js"></script>
<script>
let ME=null, ACCOUNTS=[], SNAP=null, CURSUB=null, ASSETS=[];
const PF=()=>Polaris.listProducts();
const won=v=>v==null?"-":Math.round(v).toLocaleString("ko-KR")+"원";
const eok=v=>v==null?"-":(v/1e8).toFixed(2)+"억";
const pct=v=>v==null?"-":(v>0?"+":"")+(v*100).toFixed(2)+"%";
const cls=v=>v>0?"up":v<0?"down":"flat";
const mkLabel=m=>m==="CASH"?"현금":m==="US"?"美":m==="KR"?"韓":"기타";
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));

async function boot(){
  await Polaris.seedOwner();
  let me; try{ me=await Polaris.API.me(); }catch(e){ location.href="/"; return; }
  if(!me.auth){ location.href="/"; return; }
  ME=me; ACCOUNTS=me.accounts||[]; SNAP=me.snapshot;
  renderNav();
  if(ACCOUNTS.length===0) showAssets(); else showOverview();
}
function renderNav(){
  const admin=ME.user.role==="admin"?`<a href="admin.html">관리자</a>`:"";
  document.getElementById("navbtns").innerHTML=
    `<span class="muted" style="border:none">${esc(ME.user.name)}님</span><a href="market.html">시장동향</a><a href="/">홈</a>${admin}<span onclick="logout()">로그아웃</span>`;
}
function logout(){ Polaris.API.logout(); location.href="/"; }
function root(){ return document.getElementById("root"); }

/* ───────── 상단 탭바 ───────── */
function tabbar(active){
  const prodTabs=ACCOUNTS.map(a=>{
    const on=(active==="product"&&CURSUB===a.subId)?"on":"";
    const ret=a.error?"":` <span class="${cls(a.currentReturn)}">${pct(a.currentReturn)}</span>`;
    return `<div class="tab ${on}" onclick="showProduct(${a.subId})">${esc(a.portfolioName)}${ret}</div>`;
  }).join("");
  const overview=ACCOUNTS.length?`<div class="tab ${active==="overview"?"on":""}" onclick="showOverview()">통합 요약</div>`:"";
  return `<div class="tabs">
    ${overview}${prodTabs}
    <div class="tab ${active==="assets"?"on":""}" onclick="showAssets()">자산 점검·전환</div>
    <div class="tab add" onclick="showSubscribe()">+ 상품 가입</div>
  </div>`;
}

/* ───────── 통합 요약 ───────── */
function showOverview(){
  CURSUB=null;
  const ok=ACCOUNTS.filter(a=>!a.error);
  const seed=ok.reduce((s,a)=>s+a.seed,0);
  const value=ok.reduce((s,a)=>s+a.totalValue,0);
  const cost=ok.reduce((s,a)=>s+a.totalCost,0);
  const exp=ok.reduce((s,a)=>s+a.expectedValue,0);
  const ret=cost?value/cost-1:0, gap=value-exp;
  const day=value?ok.reduce((s,a)=>s+a.totalValue*(a.dayChange/100),0)/value*100:0;
  const rows=ACCOUNTS.map(a=>{
    if(a.error) return `<tr><td>${esc(a.portfolioName||"-")}</td><td colspan="5" class="down">평가 실패</td>
      <td><span class="btn sm" onclick="showProduct(${a.subId})">열기</span></td></tr>`;
    return `<tr>
      <td>${esc(a.portfolioName)}${a.source==="converted"?' <span class="mk">전환</span>':''}</td>
      <td>${won(a.seed)}</td><td>${won(a.totalValue)}</td>
      <td class="${cls(a.currentReturn)}">${pct(a.currentReturn)}</td>
      <td class="${cls(a.gap)}">${a.gap>=0?"+":""}${eok(a.gap)}</td>
      <td class="${cls(a.dayChange)}">${pct(a.dayChange/100)}</td>
      <td><span class="btn sm" onclick="showProduct(${a.subId})">상세</span></td></tr>`;
  }).join("");
  root().innerHTML=tabbar("overview")+`
    <h1>${esc(ME.user.name)}님의 통합 자산 요약</h1>
    <div class="sub">가입 상품 ${ACCOUNTS.length}개 · 실시간 시세·환율 기준 합산</div>
    <div class="cards">
      <div class="card"><div class="k">총 평가금액</div><div class="v">${won(value)}</div><div class="s2 muted">투자원금 ${won(seed)}</div></div>
      <div class="card"><div class="k">총 수익률</div><div class="v ${cls(ret)}">${pct(ret)}</div><div class="s2 ${cls(value-cost)}">${won(value-cost)}</div></div>
      <div class="card"><div class="k">일간 등락(가중)</div><div class="v ${cls(day)}">${pct(day/100)}</div></div>
      <div class="card"><div class="k">현재 vs 예상</div><div class="v ${cls(gap)}">${gap>=0?"+":""}${eok(gap)}</div><div class="s2 muted">예상대비 ${gap>=0?"초과":"미달"}</div></div>
    </div>
    <div class="panel"><h2>가입 상품별 현황</h2>
      <table><thead><tr><th>상품</th><th>투자원금</th><th>평가금액</th><th>수익률</th><th>현재vs예상</th><th>일간</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table>
      <div class="btns"><button class="btn gold" onclick="showSubscribe()">+ 상품 추가 가입</button>
        <button class="btn" onclick="showAssets()">자산 점검·전환</button></div></div>
    <div class="panel"><h2>통합 자산 추이</h2><div id="histBoxTotal" class="muted" style="font-size:13px">월별 평가금액 추이를 불러오는 중…</div></div>
    <div class="disc">⚠️ 통합 요약은 가입한 모든 상품을 합산한 추정치입니다. 시세·환율은 외부 무료 데이터 기반으로 지연·오차가 있을 수 있습니다.</div>`;
  loadHistory("total");
}

/* ───────── 상품별 상세 ───────── */
function showProduct(subId){
  CURSUB=subId;
  const a=ACCOUNTS.find(x=>x.subId===subId);
  if(!a){ showOverview(); return; }
  if(a.error){ root().innerHTML=tabbar("product")+`<h1>${esc(a.portfolioName||"상품")}</h1><div class="disc down">이 상품의 평가를 불러오지 못했습니다: ${esc(a.error)}</div>
    <div class="btns"><button class="btn danger" onclick="unsubscribe(${subId})">가입 해지</button></div>`; return; }
  const retCls=cls(a.currentReturn), gapCls=cls(a.gap);
  const rows=a.holdings.map(h=>{
    const isCash=h.market==="CASH";
    const price=isCash?"—":(h.price!=null?won(h.price):"<span class='down'>실패</span>");
    return `<tr>
      <td><span class="mk">${mkLabel(h.market)}</span>${esc(h.label)}${isCash?"":" · "+esc(h.code)}</td>
      <td>${h.weight}% <span class="muted">/ ${h.curWeight.toFixed(1)}%</span></td>
      <td>${isCash?"—":won(h.entry)}</td><td>${price}</td><td>${won(h.value)}</td>
      <td class="${cls(h.ret)}">${pct(h.ret)}</td><td class="${cls(h.dayChange)}">${pct(h.dayChange/100)}</td></tr>`;}).join("");
  const guide=a.guide.map(g=>{const ic=g.level==="warn"?"⚠️":g.level==="good"?"✅":"💡";
    return `<li class="${g.level}"><span class="ic">${ic}</span><span>${esc(g.text)}</span></li>`;}).join("");
  root().innerHTML=tabbar("product")+`
    <h1>${esc(a.portfolioName)} 대시보드${a.source==="converted"?' <span class="mk">자산 전환</span>':''}</h1>
    <div class="sub">상품 <b>${esc(a.portfolioName)}</b> (${a.target}) · 투자 시작 ${a.startDate} · 경과 ${a.elapsedYears}년 · 환율 ${Math.round(a.fx).toLocaleString()}원</div>
    <p class="reportonly" style="color:#666;font-size:12px">북극성 자산운용 · 고객 리포트 · 생성일 ${new Date().toLocaleString("ko-KR")}</p>
    <div class="cards">
      <div class="card"><div class="k">총 평가금액</div><div class="v">${won(a.totalValue)}</div><div class="s2 muted">투자원금 ${won(a.seed)}</div></div>
      <div class="card"><div class="k">현재 수익률</div><div class="v ${retCls}">${pct(a.currentReturn)}</div><div class="s2 ${retCls}">${won(a.totalValue-a.totalCost)}</div></div>
      <div class="card"><div class="k">일간 등락(가중)</div><div class="v ${cls(a.dayChange)}">${pct(a.dayChange/100)}</div></div>
      <div class="card"><div class="k">현재 vs 예상</div><div class="v ${gapCls}">${a.gap>=0?"+":""}${eok(a.gap)}</div><div class="s2 muted">예상대비 ${a.gap>=0?"초과":"미달"}</div></div>
    </div>
    <div class="panel"><h2>예상수익 vs 현재수익</h2><div class="cmp">
      <div class="b"><div class="k">현재 평가금액</div><div class="v">${won(a.totalValue)}</div><div class="${retCls}">${pct(a.currentReturn)}</div></div>
      <div class="b"><div class="k">예상 평가금액 (목표 ${a.target})</div><div class="v">${won(a.expectedValue)}</div><div class="muted">${pct(a.expectedReturn)}</div></div>
      <div class="b"><div class="k">차이</div><div class="v ${gapCls}">${a.gap>=0?"+":""}${won(a.gap)}</div><div class="${gapCls}">${a.gap>=0?"기대 상회":"기대 하회"}</div></div>
    </div></div>
    <div class="panel"><h2>자산 추이</h2><div id="histBox" class="muted" style="font-size:13px">월별 평가금액 추이를 불러오는 중…</div></div>
    <div class="panel"><h2>보유 자산 구성</h2>
      <table><thead><tr><th>자산</th><th>비중 목표/현재</th><th>취득가</th><th>현재가</th><th>평가금액</th><th>수익률</th><th>일간</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <div class="panel"><h2>리밸런싱 도우미</h2>${rebalanceTable(a)}</div>
    <div class="panel"><h2>향후 가이드</h2><ul class="guide">${guide}</ul></div>
    <div class="btns noprint">
      <button class="btn gold" onclick="openEdit()">포트폴리오 수정</button>
      <button class="btn" onclick="window.print()">📄 리포트 PDF 저장/인쇄</button>
      <button class="btn" onclick="emailReport()">✉️ 메일로 보내기</button>
      <button class="btn danger" onclick="unsubscribe(${subId})">가입 해지</button>
    </div>
    <div class="panel" id="editPanel"><h2>포트폴리오 수정</h2>
      <div class="editrow"><label>상품 선택</label><select id="ed-pid" onchange="onProductChange()"></select></div>
      <div class="editrow"><label>투자 시드 (원)</label><input class="seed" id="ed-seed" inputmode="numeric"></div>
      <div id="ed-holdings"></div><div class="wsum" id="ed-wsum"></div>
      <p class="muted" style="font-size:12px;margin-top:6px">※ 수정 시 현재 시세로 재매수(리밸런싱)되어 취득원가와 수익률이 today 기준으로 재설정됩니다.</p>
      <div class="btns"><button class="btn gold" onclick="saveEdit()">저장하고 재투자</button>
        <button class="btn" onclick="document.getElementById('editPanel').style.display='none'">취소</button></div>
      <div class="down" id="ed-err" style="font-size:13px;margin-top:8px"></div></div>
    <div class="disc">⚠️ 본 리포트는 데모이며 실제 투자 자문이 아닙니다. 시세·환율은 외부 무료 데이터 기반으로 지연·오차가 있을 수 있습니다.
      예상수익은 상품 목표수익률 중앙값을 경과기간에 복리 적용한 단순 추정치입니다. 과거·현재 성과는 미래를 보장하지 않습니다.</div>`;
  window.scrollTo(0,0);
  loadHistory("product",subId);
}

/* ───────── 리밸런싱 도우미 ───────── */
function rebalanceTable(a){
  const tot=a.totalValue;
  const rows=a.holdings.map(h=>{
    const target=tot*h.weight/100, delta=target-h.value, buy=delta>=0;
    const shares=(h.market!=="CASH"&&h.price)?Math.abs(delta)/h.price:null;
    const small=Math.abs(delta)<tot*0.005;
    return {h,target,delta,buy,shares,small};
  });
  const act=rows.filter(r=>!r.small).length;
  const body=rows.map(r=>`<tr>
    <td><span class="mk">${mkLabel(r.h.market)}</span>${esc(r.h.label)}</td>
    <td>${r.h.curWeight.toFixed(1)}% → ${r.h.weight}%</td>
    <td>${won(r.h.value)}</td><td>${won(r.target)}</td>
    <td class="${r.small?'flat':r.buy?'up':'down'}">${r.small?'유지':(r.buy?'매수 ':'매도 ')+won(Math.abs(r.delta))}</td>
    <td class="muted">${(r.shares!=null&&!r.small)?(r.h.market==='US'?'약 '+r.shares.toFixed(2)+'주':'약 '+Math.round(r.shares).toLocaleString()+'주'):'-'}</td></tr>`).join("");
  return `<p class="muted" style="font-size:13px;margin-bottom:10px">현재 평가금액 ${won(tot)} 기준, 목표 비중으로 맞추기 위한 조정안입니다. ${act?`조정 권장 ${act}종목.`:"현재 목표 비중에 근접해 조정이 거의 필요 없습니다."}</p>
    <table><thead><tr><th>자산</th><th>현재→목표</th><th>현재평가</th><th>목표평가</th><th>조정</th><th>예상수량</th></tr></thead><tbody>${body}</tbody></table>
    <p class="muted" style="font-size:12px;margin-top:8px">※ 예상수량은 현재가 기준 근사치이며 거래비용·세금·최소 거래단위는 반영되지 않습니다.</p>`;
}

/* ───────── 자산 추이 차트 ───────── */
let HIST=null;
function lineChart(series,opts){
  opts=opts||{};
  if(!series||series.length<2) return `<div class="muted" style="font-size:13px">표시할 추이 데이터가 부족합니다(가입 후 1개월 이상 경과 시 표시).</div>`;
  const vals=series.map(p=>p[1]); let lo=Math.min(...vals),hi=Math.max(...vals);
  if(opts.seed){ lo=Math.min(lo,opts.seed); hi=Math.max(hi,opts.seed); }
  if(hi===lo) hi=lo*1.01+1;
  const W=820,H=300,PL=64,PR=14,PT=14,PB=26,n=series.length;
  const xOf=i=>PL+(W-PL-PR)*(i/(n-1)), yOf=v=>PT+(H-PT-PB)*(1-(v-lo)/(hi-lo));
  const fmtY=v=>{const e=v/1e8;return e>=1?e.toFixed(e>=10?0:1)+"억":Math.round(v/1e4).toLocaleString()+"만";};
  let grid="";for(let i=0;i<=4;i++){const v=lo+(hi-lo)*i/4,y=yOf(v);grid+=`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}" stroke="#22304a" opacity="0.4"/><text x="${PL-8}" y="${(y+4).toFixed(1)}" fill="#90a0bb" font-size="11" text-anchor="end">${fmtY(v)}</text>`;}
  let prevY=null,xlab="";series.forEach((p,i)=>{const y=p[0].slice(0,4);if(y!==prevY){prevY=y;const x=xOf(i);xlab+=`<line x1="${x.toFixed(1)}" y1="${PT}" x2="${x.toFixed(1)}" y2="${H-PB}" stroke="#22304a" opacity="0.3"/><text x="${x.toFixed(1)}" y="${H-PB+16}" fill="#90a0bb" font-size="11" text-anchor="middle">${y}</text>`;}});
  const up=series[n-1][1]>=series[0][1], col=up?"#22c55e":"#f6465d";
  const d=series.map((p,i)=>`${i?"L":"M"}${xOf(i).toFixed(1)},${yOf(p[1]).toFixed(1)}`).join(" ");
  const area=`${d} L${xOf(n-1).toFixed(1)},${(H-PB).toFixed(1)} L${PL},${(H-PB).toFixed(1)} Z`;
  const seedLine=opts.seed?`<line x1="${PL}" y1="${yOf(opts.seed).toFixed(1)}" x2="${W-PR}" y2="${yOf(opts.seed).toFixed(1)}" stroke="#90a0bb" stroke-dasharray="4 4" opacity="0.7"/><text x="${W-PR}" y="${(yOf(opts.seed)-5).toFixed(1)}" fill="#90a0bb" font-size="10" text-anchor="end">투자원금</text>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="histg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity="0.22"/><stop offset="1" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    ${grid}${xlab}${seedLine}<path d="${area}" fill="url(#histg)"/><path d="${d}" fill="none" stroke="${col}" stroke-width="2.2"/></svg>
    <div class="muted" style="font-size:12px;margin-top:6px">가입 시점부터 현재까지 월별 평가금액(보유 수량 × 과거 시세 재구성). 과거 성과는 미래를 보장하지 않습니다.</div>`;
}
async function loadHistory(scope,subId){
  const boxId=scope==="total"?"histBoxTotal":"histBox";
  try{ if(!HIST) HIST=await Polaris.API.history(); }
  catch(e){ const b=document.getElementById(boxId); if(b) b.innerHTML=`<span class="down">추이를 불러오지 못했습니다.</span>`; return; }
  const box=document.getElementById(boxId); if(!box) return;
  if(scope==="total"){
    const seed=ACCOUNTS.filter(a=>!a.error).reduce((s,a)=>s+a.seed,0);
    box.innerHTML=(HIST.total&&HIST.total.length)?lineChart(HIST.total,{seed}):`<span class="muted">추이 데이터가 없습니다.</span>`;
  }else{
    const a=ACCOUNTS.find(x=>x.subId===subId), h=HIST.accounts.find(x=>x.subId===subId);
    box.innerHTML=h?lineChart(h.series,{seed:a?a.seed:0}):`<span class="muted">추이 데이터가 없습니다.</span>`;
  }
}

/* ───────── 포트폴리오 수정(편집) ───────── */
function openEdit(){
  const a=ACCOUNTS.find(x=>x.subId===CURSUB);
  const ep=document.getElementById("editPanel"); ep.style.display="block";
  const sel=document.getElementById("ed-pid");
  sel.innerHTML=PF().map(p=>`<option value="${p.id}">${esc(p.name)} · ${p.target}</option>`).join("");
  sel.value=a.productId;
  const seed=document.getElementById("ed-seed");
  seed.value=Math.round(a.seed).toLocaleString("ko-KR");
  seed.addEventListener("input",e=>{const n=e.target.value.replace(/[^0-9]/g,"");e.target.value=n?parseInt(n,10).toLocaleString("ko-KR"):"";});
  loadHoldingsEditor(a.holdings);
  ep.scrollIntoView({behavior:"smooth"});
}
function onProductChange(){ const p=PF().find(x=>x.id===document.getElementById("ed-pid").value);
  loadHoldingsEditor(p.holdings.map(h=>({label:h.label,code:h.code,market:h.market,weight:h.weight}))); }
let EDIT_HOLD=[];
function loadHoldingsEditor(holds){
  EDIT_HOLD=holds.map(h=>({market:h.market,code:h.code,label:h.label,weight:h.weight}));
  document.getElementById("ed-holdings").innerHTML=EDIT_HOLD.map((h,i)=>`<div class="editrow">
    <label><span class="mk">${mkLabel(h.market)}</span>${esc(h.label)}</label>
    <input type="number" min="0" max="100" step="0.5" value="${h.weight}" oninput="onWeight(${i},this.value)">% </div>`).join("");
  updateWSum();
}
function onWeight(i,v){ EDIT_HOLD[i].weight=parseFloat(v)||0; updateWSum(); }
function updateWSum(){ const s=EDIT_HOLD.reduce((a,h)=>a+(h.weight||0),0);
  document.getElementById("ed-wsum").innerHTML=`비중 합계: <span class="${Math.abs(s-100)<0.5?'up':'down'}">${s.toFixed(1)}%</span> ${Math.abs(s-100)<0.5?"":"(100%로 맞춰주세요)"}`; }
async function saveEdit(){
  const pid=document.getElementById("ed-pid").value;
  const seed=parseInt(document.getElementById("ed-seed").value.replace(/[^0-9]/g,""),10);
  const s=EDIT_HOLD.reduce((a,h)=>a+(h.weight||0),0);
  if(Math.abs(s-100)>0.5){ document.getElementById("ed-err").textContent="비중 합계를 100%로 맞춰주세요."; return; }
  document.getElementById("ed-err").textContent="저장 중…";
  try{ await Polaris.API.updateAccount({subId:CURSUB,portfolioId:undefined,productId:pid,seed,holdings:EDIT_HOLD}); }
  catch(e){ document.getElementById("ed-err").textContent=e.message; return; }
  await reload(); showProduct(CURSUB);
}
async function unsubscribe(subId){
  const a=ACCOUNTS.find(x=>x.subId===subId);
  if(!confirm(`'${a?a.portfolioName:""}' 상품 가입을 해지할까요? 해당 평가내역이 삭제됩니다.`)) return;
  try{ await Polaris.API.unsubscribe({subId}); }catch(e){ alert(e.message); return; }
  await reload();
  ACCOUNTS.length?showOverview():showAssets();
}

/* ───────── 상품 가입(직접 시드) ───────── */
function showSubscribe(){
  CURSUB=null;
  const cards=PF().map(p=>`<div class="pcard">
    <span class="ptag">${esc(p.tag)}${p.custom?" · 커스텀":""}</span>
    <h3>${esc(p.name)}</h3><div class="ptarget">${p.target}</div>
    <div class="risk">${[1,2,3,4,5].map(i=>`<i class="${i<=p.risk?'on':''}"></i>`).join("")}</div>
    <div class="pdesc">${esc(p.desc)}</div>
    <button class="btn gold sm" onclick="openSubForm('${p.id}')">이 상품 가입하기 →</button>
    <div id="subform-${p.id}"></div></div>`).join("");
  root().innerHTML=tabbar("subscribe")+`
    <h1>상품 가입</h1>
    <div class="sub">원하는 모델 포트폴리오를 선택해 가입하세요. 보유 자산을 그대로 옮기려면 <a style="color:var(--gold2)" onclick="showAssets()">자산 점검·전환</a>을 이용하세요.</div>
    <div class="pgrid">${cards}</div>`;
}
function openSubForm(pid){
  const box=document.getElementById("subform-"+pid);
  if(box.innerHTML){ box.innerHTML=""; return; }
  document.querySelectorAll("[id^=subform-]").forEach(b=>b.innerHTML="");
  box.innerHTML=`<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
    <label class="muted" style="font-size:12px">투자 시드 (원)</label>
    <input id="sf-seed-${pid}" inputmode="numeric" value="100,000,000" style="width:100%;padding:9px;margin:4px 0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);text-align:right"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')?parseInt(this.value.replace(/[^0-9]/g,''),10).toLocaleString('ko-KR'):''">
    <label class="muted" style="font-size:12px">투자 시작일</label>
    <input id="sf-date-${pid}" type="date" value="${new Date().toISOString().slice(0,10)}" style="width:100%;padding:9px;margin:4px 0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text)">
    <button class="btn gold sm" style="width:100%" onclick="doSubscribe('${pid}')">가입 확정</button>
    <div class="down" id="sf-err-${pid}" style="font-size:12px;margin-top:6px"></div></div>`;
}
async function doSubscribe(pid){
  const seed=parseInt((document.getElementById("sf-seed-"+pid).value||"").replace(/[^0-9]/g,""),10);
  const startDate=document.getElementById("sf-date-"+pid).value;
  const err=document.getElementById("sf-err-"+pid);
  if(!seed||seed<10000){ err.textContent="시드 금액을 확인해 주세요."; return; }
  err.textContent="가입 처리 중…";
  let r; try{ r=await Polaris.API.subscribe({productId:pid,seed,startDate}); }catch(e){ err.textContent=e.message; return; }
  await reload(); showProduct(r.subId);
}

/* ───────── 자산 점검 + 전환 ───────── */
function showAssets(){
  CURSUB=null;
  ASSETS=(SNAP&&SNAP.assets&&SNAP.assets.length)?SNAP.assets.map(a=>({...a,ret:a.ret*100})):[{label:"",market:"KR",amount:"",ret:""}];
  const opts=PF().map(p=>`<option value="${p.id}">${esc(p.name)} · ${p.target}</option>`).join("");
  root().innerHTML=tabbar("assets")+`
    <h1>내 투자 상태 점검</h1>
    <div class="sub">현재 보유 중인 자산을 입력하면 평가액·수익률을 합산해 보여드리고, 원하는 상품으로 <b>전환(자동 배분)</b>할 수 있습니다.${ACCOUNTS.length?"":" 아직 가입한 상품이 없습니다."}</div>
    <div class="panel"><h2>현재 보유 자산 입력</h2>
      <div class="ahead"><div>자산명</div><div>시장</div><div>현재 평가액(원)</div><div>수익률(%)</div><div></div></div>
      <div id="assetRows"></div>
      <div class="btns"><button class="btn sm" onclick="addAssetRow()">+ 자산 추가</button>
        <button class="btn gold sm" onclick="saveAssets()">자산 점검 저장</button></div>
      <div id="assetSummary"></div></div>
    <div class="panel"><h2>상품으로 전환 (자동 배분)</h2>
      <p class="muted" style="font-size:13px;margin-bottom:10px">입력한 자산의 <b>총 평가액</b>을 시드로 삼아 선택한 상품의 모델 비중대로 재배분합니다. 아래에서 전환 전/후 구성을 비교한 뒤 실행하세요.</p>
      <div class="editrow"><label>전환할 상품</label><select id="cv-pid" onchange="renderConvert()">${opts}</select></div>
      <div id="convertPreview"></div>
      <div class="btns"><button class="btn gold" onclick="doConvert()">전환 실행 (가입)</button></div>
      <div class="down" id="cv-err" style="font-size:13px;margin-top:8px"></div></div>
    <div class="disc">⚠️ 전환은 입력한 평가액을 기준으로 모델 포트폴리오를 새로 매수(가입)하는 시뮬레이션입니다. 실제 매도·세금·수수료는 반영되지 않습니다.</div>`;
  renderAssetRows();
}
function renderAssetRows(){
  document.getElementById("assetRows").innerHTML=ASSETS.map((a,i)=>`<div class="arow">
    <input class="nm" placeholder="예: 삼성전자 / 예금" value="${esc(a.label)}" oninput="setAsset(${i},'label',this.value)">
    <select onchange="setAsset(${i},'market',this.value)">
      ${["KR","US","CASH","ETC"].map(m=>`<option value="${m}" ${a.market===m?"selected":""}>${m==="KR"?"한국주식":m==="US"?"미국주식":m==="CASH"?"현금/예금":"기타"}</option>`).join("")}
    </select>
    <input inputmode="numeric" placeholder="0" value="${a.amount!==""&&a.amount!=null?Number(a.amount).toLocaleString("ko-KR"):""}" oninput="setAmount(${i},this)">
    <input inputmode="decimal" placeholder="0" value="${a.ret!==""&&a.ret!=null?a.ret:""}" oninput="setAsset(${i},'ret',this.value)">
    <div class="x" onclick="removeAssetRow(${i})">✕</div></div>`).join("");
  updateAssetSummary();
}
function setAsset(i,k,v){ ASSETS[i][k]=v; updateAssetSummary(); }
function setAmount(i,inp){ const n=inp.value.replace(/[^0-9]/g,""); ASSETS[i].amount=n?parseInt(n,10):""; inp.value=n?parseInt(n,10).toLocaleString("ko-KR"):""; updateAssetSummary(); }
function addAssetRow(){ ASSETS.push({label:"",market:"KR",amount:"",ret:""}); renderAssetRows(); }
function removeAssetRow(i){ ASSETS.splice(i,1); if(!ASSETS.length)ASSETS.push({label:"",market:"KR",amount:"",ret:""}); renderAssetRows(); }
function assetTotals(){
  let val=0,cost=0;
  ASSETS.forEach(a=>{ const amt=Number(a.amount)||0; const r=(Number(a.ret)||0)/100; if(amt>0){ val+=amt; cost+=amt/(1+r); } });
  return {val,cost,gain:val-cost,ret:cost>0?val/cost-1:0};
}
function updateAssetSummary(){
  const t=assetTotals();
  document.getElementById("assetSummary").innerHTML=`<div class="cards" style="margin-top:14px">
    <div class="card"><div class="k">총 평가액</div><div class="v">${won(t.val)}</div></div>
    <div class="card"><div class="k">추정 원금</div><div class="v">${won(t.cost)}</div></div>
    <div class="card"><div class="k">평가 손익</div><div class="v ${cls(t.gain)}">${won(t.gain)}</div></div>
    <div class="card"><div class="k">블렌디드 수익률</div><div class="v ${cls(t.ret)}">${pct(t.ret)}</div></div></div>`;
  if(document.getElementById("convertPreview")) renderConvert();
}
async function saveAssets(){
  const payload=ASSETS.map(a=>({label:a.label,market:a.market,amount:Number(a.amount)||0,ret:(Number(a.ret)||0)/100}));
  try{ const r=await Polaris.API.saveSnapshot({assets:payload}); SNAP=r.snapshot; alert("자산 점검 내용을 저장했습니다."); }
  catch(e){ alert(e.message); }
}
function renderConvert(){
  const box=document.getElementById("convertPreview"); if(!box) return;
  const t=assetTotals();
  const p=PF().find(x=>x.id===document.getElementById("cv-pid").value);
  if(t.val<=0||!p){ box.innerHTML=`<p class="muted" style="font-size:13px">자산을 입력하면 전환 전/후 구성을 비교해 드립니다.</p>`; return; }
  const before=ASSETS.filter(a=>(Number(a.amount)||0)>0).map(a=>{const amt=Number(a.amount)||0;
    return `<tr><td><span class="mk">${mkLabel(a.market)}</span>${esc(a.label||"자산")}</td><td>${(amt/t.val*100).toFixed(1)}%</td><td>${won(amt)}</td></tr>`;}).join("");
  const after=p.holdings.map(h=>`<tr><td><span class="mk">${mkLabel(h.market)}</span>${esc(h.label)}</td><td>${h.weight}%</td><td>${won(t.val*h.weight/100)}</td></tr>`).join("");
  box.innerHTML=`<div class="twogrid" style="margin-top:6px">
    <div><div class="muted" style="font-size:12px;margin-bottom:4px">전환 전 (현재 보유)</div>
      <table><thead><tr><th>자산</th><th>비중</th><th>금액</th></tr></thead><tbody>${before}</tbody></table></div>
    <div><div class="muted" style="font-size:12px;margin-bottom:4px">전환 후 (${esc(p.name)} 모델 배분)</div>
      <table><thead><tr><th>자산</th><th>목표비중</th><th>배분금액</th></tr></thead><tbody>${after}</tbody></table></div>
  </div><div class="wsum">전환 시드(총 평가액): <span class="up">${won(t.val)}</span></div>`;
}
async function doConvert(){
  const err=document.getElementById("cv-err");
  const t=assetTotals();
  if(t.val<=0){ err.textContent="먼저 보유 자산을 입력해 주세요."; return; }
  const pid=document.getElementById("cv-pid").value;
  const p=PF().find(x=>x.id===pid);
  if(!confirm(`총 ${won(t.val)}을(를) '${p.name}' 상품 비중으로 전환(가입)할까요?`)) return;
  err.textContent="전환 처리 중…";
  const payload=ASSETS.map(a=>({label:a.label,market:a.market,amount:Number(a.amount)||0,ret:(Number(a.ret)||0)/100}));
  try{
    await Polaris.API.saveSnapshot({assets:payload});
    const r=await Polaris.API.convert({productId:pid});
    await reload(); showProduct(r.subId);
  }catch(e){ err.textContent=e.message; }
}

/* ───────── 공통 ───────── */
async function reload(){ const me=await Polaris.API.me(); ME=me; ACCOUNTS=me.accounts||[]; SNAP=me.snapshot; HIST=null; }
function emailReport(){
  const a=ACCOUNTS.find(x=>x.subId===CURSUB); if(!a) return;
  const lines=[`[북극성 자산운용] ${ME.user.name}님 투자 리포트`,``,
    `상품: ${a.portfolioName} (${a.target})`,
    `투자원금: ${won(a.seed)} / 투자시작: ${a.startDate} (경과 ${a.elapsedYears}년)`,
    `현재 평가금액: ${won(a.totalValue)} (${pct(a.currentReturn)})`,
    `예상 평가금액: ${won(a.expectedValue)} (${pct(a.expectedReturn)})`,
    `현재-예상 차이: ${a.gap>=0?"+":""}${won(a.gap)}`,``,`[보유자산]`,
    ...a.holdings.map(h=>` - ${h.label}: 비중 ${h.weight}%→${h.curWeight.toFixed(1)}%, 평가 ${won(h.value)} (${pct(h.ret)})`),
    ``,`[가이드]`,...a.guide.map(g=>` - ${g.text}`),``,
    `※ 상세 표/그래프는 대시보드의 'PDF 저장/인쇄'로 첨부해 주세요.`];
  location.href=`mailto:${ME.user.email}?subject=${encodeURIComponent("북극성 자산운용 투자 리포트 - "+ME.user.name+"님")}&body=${encodeURIComponent(lines.join("\n"))}`;
}
boot();
